<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.2.3/build/index.min.js"></script>
</head>
<body>
<div id="result">Running...</div>
<script>
    async function test() {
        try {
            const docChildren = [];
            const props = { spacing: { after: 200 } };
            props.pageBreakBefore = true;
            docChildren.push(new docx.Paragraph({
                ...props,
                children: [new docx.TextRun({ text: "Hello".trim() })]
            }));
            
            const doc = new docx.Document({
                sections: [{
                    properties: {},
                    children: docChildren
                }]
            });
            const blob = await docx.Packer.toBlob(doc);
            document.getElementById('result').innerText = 'Success! Size: ' + blob.size;
        } catch (e) {
            document.getElementById('result').innerText = 'Error: ' + String(e.message || e);
            console.error(e);
        }
    }
    test();
</script>
</body>
</html>
